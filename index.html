<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VW Entregas PRO | Castellana Wagen</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --vw-blue: #001E50; --vw-light: #00B0F0; --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12); --success: #25D366; --warning: #ff9800; --danger: #ff4444;
            --bg-dark: #000510;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { margin: 0; background: var(--bg-dark); color: white; min-height: 100vh; padding-bottom: 80px; }

        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .screen.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CABECERA DE DÍA */
        .day-header {
            background: var(--vw-blue);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 3px solid var(--vw-light);
        }
        .day-header h1 { margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 2px; }

        /* TARJETA DE COCHE (PESTAÑA) */
        .car-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .card-top {
            background: rgba(255,255,255,0.05);
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }
        .delivery-time { font-size: 22px; font-weight: 900; color: var(--vw-light); }
        .renting-tag { background: var(--vw-light); color: var(--vw-blue); padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; }

        .card-body { padding: 18px; }
        .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 12px; }
        .data-label { font-size: 9px; opacity: 0.5; text-transform: uppercase; margin-bottom: 2px; letter-spacing: 0.5px; }
        .data-value { font-size: 14px; font-weight: 600; }
        
        .vin-box { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px; margin-top: 10px; border: 1px dashed rgba(255,255,255,0.2); }

        /* ALERTAS VO */
        .vo-indicator { padding: 8px; border-radius: 8px; text-align: center; font-size: 11px; font-weight: bold; margin-top: 10px; }
        .vo-si { background: rgba(255, 152, 0, 0.2); color: var(--warning); border: 1px solid var(--warning); }
        .vo-no { background: rgba(37, 211, 102, 0.1); color: var(--success); border: 1px solid var(--success); }

        /* BOTONES RAPIDOS */
        .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; background: rgba(0,0,0,0.2); }
        .btn-mini { padding: 12px; border-radius: 10px; text-align: center; text-decoration: none; color: white; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* NAVEGACIÓN INFERIOR */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: rgba(0,10,30,0.95); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--glass-border); backdrop-filter: blur(10px); }
        .nav-btn { opacity: 0.4; text-align: center; font-size: 10px; color: white; text-decoration: none; }
        .nav-btn.active { opacity: 1; color: var(--vw-light); }
    </style>
</head>
<body>

    <section id="s-login" class="screen active" style="justify-content: center; min-height: 100vh;">
        <div style="text-align: center;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6d/Volkswagen_logo_2019.svg" width="60" style="filter: brightness(0) invert(1); margin-bottom: 20px;">
            <h2>Castellana Wagen <b style="color:var(--vw-light)">PRO</b></h2>
            <button onclick="login('Manuel')" style="width: 100%; padding: 20px; border-radius: 15px; background: var(--vw-blue); color: white; border: 1px solid var(--vw-light); font-weight: bold; margin-top: 30px;">ACCEDER COMO MANUEL</button>
        </div>
    </section>

    <section id="s-agenda" class="screen">
        <div class="day-header">
            <h1 id="current-day-label">CARGANDO...</h1>
        </div>
        <div id="lista-entregas"></div>
    </section>

    <section id="s-mapa" class="screen">
        <h2>Ubicación en Taller</h2>
        <div id="map-placeholder" style="background:var(--glass); height: 400px; border-radius: 15px; display: flex; align-items: center; justify-content: center; opacity: 0.5;">
            Pronto aquí el plano dinámico corregido
        </div>
    </section>

    <nav class="nav-bar" id="main-nav" style="display: none;">
        <a href="#" class="nav-btn active" onclick="showScreen('s-agenda')"><i class="fas fa-calendar-day fa-lg"></i><p>ENTREGAS</p></a>
        <a href="#" class="nav-btn" onclick="showScreen('s-mapa')"><i class="fas fa-map-marked-alt fa-lg"></i><p>TALLER</p></a>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbz-wRoC-N2bp2kvy5OUwp9qBcKJq3JT3r1vFuobX-7TwnvHXkGQapbc6BMhfU166HXQ/exec";
        let userActivo = "";

        function login(name) {
            userActivo = name;
            document.getElementById('s-login').classList.remove('active');
            document.getElementById('s-agenda').classList.add('active');
            document.getElementById('main-nav').style.display = 'flex';
            cargarDatos();
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function cargarDatos() {
            const container = document.getElementById('lista-entregas');
            container.innerHTML = "<p style='text-align:center; opacity:0.5'>Buscando en el Excel...</p>";
            
            try {
                const resp = await fetch(`${API}?action=getAgenda&agente=${userActivo}`);
                const datos = await resp.json();
                renderizarTarjetas(datos);
            } catch (e) {
                container.innerHTML = "<p style='color:red'>Error de conexión</p>";
            }
        }

        function renderizarTarjetas(datos) {
            const container = document.getElementById('lista-entregas');
            container.innerHTML = "";
            
            if (datos.length > 0) {
                const f = new Date(datos[0].fechaHora);
                document.getElementById('current-day-label').innerText = f.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
            }

            datos.forEach(item => {
                const f = new Date(item.fechaHora);
                const hora = f.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
                const voClass = item.entregaVO === "SÍ" ? "vo-si" : "vo-no";
                const voText = item.entregaVO === "SÍ" ? "⚠️ ENTREGA COCHE USADO" : "SIN ENTREGA DE USADO";
                const tel = String(item.telefono || "").replace(/\s/g, '');

                container.innerHTML += `
                    <div class="car-card">
                        <div class="card-top">
                            <div class="delivery-time">${hora}</div>
                            <div class="renting-tag">${item.renting || 'PARTICULAR'}</div>
                        </div>
                        <div class="card-body">
                            <div class="data-label">Cliente / Conductor</div>
                            <div class="data-value" style="font-size: 18px; color: var(--vw-light); margin-bottom:15px;">${item.cliente}</div>
                            
                            <div class="info-row">
                                <div>
                                    <div class="data-label">Modelo</div>
                                    <div class="data-value">${item.modelo}</div>
                                </div>
                                <div>
                                    <div class="data-label">Matrícula</div>
                                    <div class="data-value" style="letter-spacing:1px">${item.matricula}</div>
                                </div>
                            </div>

                            <div class="vin-box">
                                <div class="data-label">Número de Bastidor (VIN)</div>
                                <div class="data-value" style="font-family: monospace; font-size:13px; color: #aaa;">${item.bastidor || 'NO DISPONIBLE'}</div>
                            </div>

                            <div class="vo-indicator ${voClass}">${voText}</div>
                        </div>
                        <div class="card-actions">
                            <a href="https://wa.me/34${tel}" class="btn-mini" style="background:#25D366"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
                            <a href="tel:${tel}" class="btn-mini" style="background:var(--vw-light); color:var(--vw-blue)"><i class="fas fa-phone"></i> LLAMAR</a>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
