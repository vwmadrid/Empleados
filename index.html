<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VW PRO | Garaje Bastidor Completo</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --vw-blue: #001E50; --vw-light: #00B0F0; --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1); --success: #25D366; --warning: #ff9800; --danger: #ff4444;
            --bg-dark: #000510;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { margin: 0; background: var(--bg-dark); color: white; min-height: 100vh; padding-bottom: 90px; }

        /* NAVEGACIÓN */
        .nav-bottom {
            position: fixed; bottom: 0; left: 0; right: 0; height: 75px;
            background: rgba(0, 10, 30, 0.95); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--glass-border); z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0.4; color: white; text-decoration: none; }
        .nav-item.active { opacity: 1; color: var(--vw-light); }
        .nav-item i { font-size: 20px; }
        .nav-item span { font-size: 10px; font-weight: bold; }

        .screen { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* AGENDA */
        .day-divider {
            background: linear-gradient(90deg, var(--vw-blue), transparent);
            padding: 10px 15px; margin: 25px 0 10px 0; border-left: 4px solid var(--vw-light);
            position: sticky; top: 0; z-index: 10; backdrop-filter: blur(10px);
        }
        .day-divider h2 { margin: 0; font-size: 15px; text-transform: uppercase; }

        .car-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; margin-bottom: 20px; overflow: hidden; }
        .card-header { padding: 12px 15px; background: rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .delivery-hour { font-size: 24px; font-weight: 800; color: var(--vw-light); }
        
        .status-badge { font-size: 9px; padding: 4px 8px; border-radius: 5px; font-weight: bold; }
        .pedido-si { background: #004a99; color: white; }
        .pedido-no { background: #444; color: #aaa; }

        .card-content { padding: 15px; }
        .vin-box { background: rgba(0,0,0,0.4); padding: 8px; border-radius: 8px; margin: 10px 0; border: 1px dashed rgba(255,255,255,0.2); }
        .vin-text { font-family: monospace; font-size: 12px; color: var(--vw-light); }

        .extra-data { display: flex; gap: 10px; margin-top: 10px; }
        .data-tag { flex: 1; padding: 8px; border-radius: 8px; font-size: 10px; text-align: center; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); }
        .tag-blue { background: rgba(0, 176, 240, 0.1); color: var(--vw-light); border-color: var(--vw-light); cursor: pointer; }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; background: rgba(0,0,0,0.2); }
        .btn-act { padding: 12px; border-radius: 10px; text-align: center; text-decoration: none; color: white; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 6px; }

        /* PLANO GARAJE */
        .map-wrapper { overflow-x: auto; padding: 10px; background: #050a15; border-radius: 12px; border: 1px solid var(--glass-border); }
        .map-grid { display: grid; grid-template-columns: repeat(24, 30px); grid-template-rows: repeat(20, 35px); gap: 3px; }
        .spot { 
            background: var(--success); color: white; border-radius: 4px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; font-weight: bold; border: 1px solid rgba(0,0,0,0.1);
            overflow: hidden; text-align: center; line-height: 1;
        }
        .spot.occupied { background: var(--danger); }
        .spot-vin-text { font-size: 7px; word-break: break-all; padding: 0 2px; margin-top: 5px; }
        .spot-num { position: absolute; top: 1px; left: 2px; font-size: 7px; opacity: 0.8; color: #fff; }
        .pasillo { background: #1a253a; color: #4e5d7a; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; text-align: center; }

        #auto-assign-bar { 
            position: fixed; top: 0; left: 0; right: 0; background: var(--vw-light); color: var(--vw-blue); 
            padding: 10px; text-align: center; font-weight: bold; font-size: 12px; z-index: 2000; display: none;
        }
    </style>
</head>
<body>

    <div id="auto-assign-bar">ASIGNANDO BASTIDOR: <span id="target-vin"></span> <button onclick="cancelAssign()" style="background:var(--vw-blue); color:white; border:none; padding:2px 8px; border-radius:4px; margin-left:10px;">CANCELAR</button></div>

    <nav class="nav-bottom" id="main-nav" style="display: none;">
        <div class="nav-item active" id="nav-agenda" onclick="switchTab('s-agenda')">
            <i class="fas fa-list-ul"></i><span>Agenda</span>
        </div>
        <div class="nav-item" id="nav-mapa" onclick="switchTab('s-mapa')">
            <i class="fas fa-warehouse"></i><span>Garaje</span>
        </div>
    </nav>

    <section id="s-login" class="screen active" style="padding-top: 15vh; text-align: center;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6d/Volkswagen_logo_2019.svg" width="60" style="filter: invert(1);">
        <h2 style="font-weight: 200; margin: 30px 0;">Castellana Wagen <b style="color:var(--vw-light)">PRO</b></h2>
        <button onclick="iniciar('Manuel')" style="width:80%; padding:20px; border-radius:15px; background:var(--vw-blue); color:white; border:1px solid var(--vw-light); font-weight:bold; margin-bottom:15px;">MANUEL</button>
        <button onclick="iniciar('Alejandro')" style="width:80%; padding:20px; border-radius:15px; background:transparent; color:white; border:1px solid #444; font-weight:bold;">ALEJANDRO</button>
    </section>

    <section id="s-agenda" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1 id="user-title" style="font-size:18px;">AGENDA</h1>
            <i class="fas fa-sync-alt" onclick="cargarAgenda()"></i>
        </div>
        <div id="contenedor-agenda"></div>
    </section>

    <section id="s-mapa" class="screen">
        <h2 style="font-size:18px; margin-bottom:10px;">Plano del Garaje</h2>
        <input type="text" id="busc-map" placeholder="Buscar por bastidor..." onkeyup="buscarEnMapa()" style="width:100%; padding:12px; border-radius:10px; background:var(--glass); border:1px solid var(--glass-border); color:white; margin-bottom:15px;">
        <div class="map-wrapper">
            <div class="map-grid" id="parking-grid"></div>
        </div>
    </section>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz-wRoC-N2bp2kvy5OUwp9qBcKJq3JT3r1vFuobX-7TwnvHXkGQapbc6BMhfU166HXQ/exec";
        let agente = "";
        let parkingData = JSON.parse(localStorage.getItem('parkingData')) || {};
        let pendingVIN = null;

        function iniciar(n) {
            agente = n;
            document.getElementById('s-login').classList.remove('active');
            document.getElementById('s-agenda').classList.add('active');
            document.getElementById('main-nav').style.display = 'flex';
            cargarAgenda();
            renderMap();
        }

        function switchTab(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id.split('-')[1]).classList.add('active');
            window.scrollTo(0,0);
        }

        function startAutoAssign(vin) {
            if(!vin || vin === 'NO DISPONIBLE') { alert("Este coche no tiene bastidor registrado."); return; }
            pendingVIN = vin.toUpperCase();
            document.getElementById('target-vin').innerText = pendingVIN;
            document.getElementById('auto-assign-bar').style.display = 'block';
            switchTab('s-mapa');
        }

        function cancelAssign() {
            pendingVIN = null;
            document.getElementById('auto-assign-bar').style.display = 'none';
        }

        async function cargarAgenda() {
            const lista = document.getElementById('contenedor-agenda');
            lista.innerHTML = '<p style="text-align:center; padding:40px; opacity:0.5;">Sincronizando...</p>';
            try {
                const r = await fetch(`${API_URL}?action=getAgenda&agente=${agente}`);
                const datos = await r.json();
                const grupos = {};
                datos.forEach(item => {
                    const f = new Date(item.fechaHora).toLocaleDateString('es-ES', { weekday: 'long', day: '2-digit', month: 'long' });
                    if (!grupos[f]) grupos[f] = [];
                    grupos[f].push(item);
                });

                lista.innerHTML = "";
                for (const dia in grupos) {
                    lista.innerHTML += `<div class="day-divider"><h2>${dia}</h2></div>`;
                    grupos[dia].forEach(coche => {
                        const hora = new Date(coche.fechaHora).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
                        const tel = String(coche.telefono || "").replace(/\s/g, '');
                        const vin = (coche.bastidor || 'NO DISPONIBLE').toUpperCase();
                        
                        let plazaAsignada = null;
                        for(let id in parkingData) { if(parkingData[id].vin === vin) plazaAsignada = id; }

                        lista.innerHTML += `
                            <div class="car-card">
                                <div class="card-header">
                                    <span class="delivery-hour">${hora}</span>
                                    <span class="status-badge ${coche.pedido === 'SÍ' ? 'pedido-si' : 'pedido-no'}">${coche.pedido === 'SÍ' ? 'PEDIDO' : 'NO PEDIDO'}</span>
                                </div>
                                <div class="card-content">
                                    <div style="font-size:18px; font-weight:bold; margin-bottom:10px;">${coche.cliente}</div>
                                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                                        <div><div style="font-size:9px; opacity:0.5;">MODELO</div><div style="font-size:13px;">${coche.modelo}</div></div>
                                        <div><div style="font-size:9px; opacity:0.5;">MATRÍCULA</div><div style="font-size:13px; font-weight:bold;">${coche.matricula}</div></div>
                                    </div>
                                    <div class="vin-box">
                                        <div style="font-size:9px; opacity:0.5;">BASTIDOR (VIN)</div>
                                        <div class="vin-text">${vin}</div>
                                    </div>
                                    <div class="extra-data">
                                        <div class="data-tag" style="color:${coche.entregaVO === 'SÍ' ? 'var(--warning)' : 'var(--success)'}; border-color:${coche.entregaVO === 'SÍ' ? 'var(--warning)' : 'var(--success)'}">ENTREGA VEHÍCULO: ${coche.entregaVO === 'SÍ' ? 'SÍ' : 'NO'}</div>
                                        <div class="data-tag tag-blue" onclick="startAutoAssign('${vin}')">
                                            <i class="fas fa-map-marker-alt"></i> ${plazaAsignada ? 'PLAZA ' + plazaAsignada : 'ASIGNAR PLAZA'}
                                        </div>
                                    </div>
                                </div>
                                <div class="actions">
                                    <a href="https://wa.me/34${tel}" class="btn-act" style="background:#25D366"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
                                    <a href="tel:${tel}" class="btn-act" style="background:var(--vw-blue); border:1px solid var(--vw-light)"><i class="fas fa-phone"></i> LLAMAR</a>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (e) { lista.innerHTML = '<p style="color:red; text-align:center;">Error de conexión.</p>'; }
        }

        // CONFIGURACIÓN GARAJE COMPLETO
        const mapConfig = [
            ...Array.from({length: 20}, (_, i) => ({ id: (12 + i).toString(), col: '1 / 6', row: `${i + 1} / ${i + 2}` })),
            { id: '11', col: '10 / 16', row: '1 / 2' }, { id: '9', col: '10 / 16', row: '2 / 3' },
            { id: '8', col: '10 / 16', row: '3 / 4' }, { id: '7', col: '10 / 16', row: '4 / 5' },
            { id: '6', col: '10 / 16', row: '5 / 6' }, { id: '10', col: '16 / 22', row: '1 / 2' },
            { id: '5', col: '16 / 22', row: '5 / 6' },
            ...Array.from({length: 9}, (_, i) => ({ id: (50 - i).toString(), col: '10 / 16', row: `${7 + i} / ${8 + i}` })),
            { id: '4', col: '22 / 25', row: '7 / 9' }, { id: '3', col: '22 / 25', row: '9 / 11' },
            { id: '2', col: '22 / 25', row: '11 / 13' }, { id: '1', col: '22 / 25', row: '13 / 15' },
            { id: '41', col: '8 / 10', row: '17 / 19' }, { id: '40', col: '10 / 13', row: '17 / 19' },
            { id: '39', col: '13 / 16', row: '17 / 19' }, { id: '38', col: '16 / 19', row: '17 / 19' },
            { id: '37', col: '19 / 22', row: '17 / 19' }, { id: '32', col: '8 / 10', row: '19 / 21' },
            { id: '33', col: '10 / 13', row: '19 / 21' }, { id: '34', col: '13 / 16', row: '19 / 21' },
            { id: '35', col: '16 / 19', row: '19 / 21' }, { id: '36', col: '19 / 22', row: '19 / 21' }
        ];

        function renderMap() {
            const grid = document.getElementById('parking-grid');
            grid.innerHTML = `
                <div class="pasillo" style="grid-column:6/10; grid-row:1/21; writing-mode: vertical-rl;">PASILLO CENTRAL</div>
                <div class="pasillo" style="grid-column:16/22; grid-row:7/16; background:#121a2d;">RAMPA</div>
            `;
            mapConfig.forEach(c => {
                const data = parkingData[c.id];
                const div = document.createElement('div');
                div.className = 'spot ' + (data ? 'occupied' : '');
                div.id = 'plaza-' + c.id;
                div.style.gridColumn = c.col; div.style.gridRow = c.row;
                
                // Mostrar bastidor completo
                const fullVin = data ? data.vin : '';
                div.innerHTML = `
                    <span class="spot-num">${c.id}</span>
                    <div class="spot-vin-text">${fullVin}</div>
                `;
                
                div.onclick = () => {
                    if(pendingVIN) {
                        parkingData[c.id] = { vin: pendingVIN, timestamp: Date.now() };
                        cancelAssign();
                    } else if(data) {
                        if(confirm("Plaza " + c.id + "\nBastidor completo: " + data.vin + "\n\n¿Liberar plaza?")) delete parkingData[c.id];
                    } else {
                        const vinManual = prompt("Introducir Bastidor manualmente:");
                        if(vinManual) parkingData[c.id] = { vin: vinManual.toUpperCase(), timestamp: Date.now() };
                    }
                    localStorage.setItem('parkingData', JSON.stringify(parkingData));
                    renderMap(); cargarAgenda();
                };
                grid.appendChild(div);
            });
        }

        function buscarEnMapa() {
            const busq = document.getElementById('busc-map').value.toUpperCase();
            mapConfig.forEach(c => {
                const el = document.getElementById('plaza-' + c.id);
                if(busq && parkingData[c.id] && parkingData[c.id].vin.includes(busq)) {
                    el.style.border = "2px solid white"; el.style.transform = "scale(1.1)"; el.style.zIndex = "10";
                } else { el.style.border = "1px solid rgba(0,0,0,0.1)"; el.style.transform = "scale(1)"; el.style.zIndex = "1"; }
            });
        }
    </script>
</body>
</html>
