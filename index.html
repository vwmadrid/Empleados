<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Agenda VW PRO | Castellana Wagen</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --vw-blue: #001E50; --vw-light: #00B0F0; --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1); --success: #25D366; --warning: #ff9800; --bg-dark: #000510;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { margin: 0; background: var(--bg-dark); color: white; min-height: 100vh; padding-bottom: 50px; }

        .screen { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* SEPARADOR DE DÍA */
        .day-divider {
            background: linear-gradient(90deg, var(--vw-blue), transparent);
            padding: 10px 15px;
            margin: 25px 0 15px 0;
            border-left: 4px solid var(--vw-light);
            border-radius: 4px;
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(10px);
        }
        .day-divider h2 { margin: 0; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }

        /* TARJETA DE ENTREGA */
        .car-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .card-header {
            padding: 10px 15px;
            background: rgba(255,255,255,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }
        .delivery-hour { font-size: 20px; font-weight: 800; color: var(--vw-light); }
        .renting-label { font-size: 10px; background: var(--vw-light); color: var(--vw-blue); padding: 2px 8px; border-radius: 4px; font-weight: bold; }

        .card-content { padding: 15px; }
        .client-name { font-size: 17px; font-weight: bold; margin-bottom: 12px; color: #fff; }
        
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .label { font-size: 9px; opacity: 0.5; text-transform: uppercase; margin-bottom: 2px; }
        .value { font-size: 13px; font-weight: 500; }

        .vin-box { 
            background: rgba(0,0,0,0.4); 
            padding: 8px; 
            border-radius: 8px; 
            margin: 10px 0; 
            border: 1px dashed rgba(255,255,255,0.1);
        }
        .vin-text { font-family: monospace; font-size: 12px; color: #00B0F0; }

        .vo-tag { 
            font-size: 11px; font-weight: bold; padding: 6px; border-radius: 6px; text-align: center; margin-top: 5px;
        }
        .vo-si { background: rgba(255, 152, 0, 0.15); color: var(--warning); border: 1px solid var(--warning); }
        .vo-no { background: rgba(37, 211, 102, 0.1); color: var(--success); border: 1px solid var(--success); }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px 15px; background: rgba(0,0,0,0.2); }
        .btn-act { padding: 10px; border-radius: 8px; text-align: center; text-decoration: none; color: white; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }

        .loading { text-align: center; padding: 40px; opacity: 0.5; }
    </style>
</head>
<body>

    <section id="s-login" class="screen active" style="padding-top: 20vh;">
        <div style="text-align: center;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6d/Volkswagen_logo_2019.svg" width="50" style="filter: invert(1);">
            <h2 style="font-weight: 200; margin: 20px 0;">Gestión de Entregas</h2>
            <button onclick="iniciar('Manuel')" style="width:80%; padding:18px; border-radius:12px; background:var(--vw-blue); color:white; border:1px solid var(--vw-light); font-weight:bold; margin-bottom:15px;">MANUEL</button>
            <button onclick="iniciar('Alejandro')" style="width:80%; padding:18px; border-radius:12px; background:transparent; color:white; border:1px solid #444; font-weight:bold;">ALEJANDRO</button>
        </div>
    </section>

    <section id="s-agenda" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h1 id="user-title" style="font-size: 18px; color: var(--vw-light);">AGENDA</h1>
            <i class="fas fa-sync-alt" onclick="cargarAgenda()"></i>
        </div>
        <div id="contenedor-agenda"></div>
    </section>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz-wRoC-N2bp2kvy5OUwp9qBcKJq3JT3r1vFuobX-7TwnvHXkGQapbc6BMhfU166HXQ/exec";
        let agente = "";

        function iniciar(nombre) {
            agente = nombre;
            document.getElementById('user-title').innerText = "AGENDA: " + nombre.toUpperCase();
            document.getElementById('s-login').classList.remove('active');
            document.getElementById('s-agenda').classList.add('active');
            cargarAgenda();
        }

        async function cargarAgenda() {
            const lista = document.getElementById('contenedor-agenda');
            lista.innerHTML = '<div class="loading">Cargando todas las entregas...</div>';
            
            try {
                const r = await fetch(`${API_URL}?action=getAgenda&agente=${agente}`);
                const datos = await r.json();
                
                // --- LÓGICA DE AGRUPACIÓN POR DÍA ---
                const grupos = {};
                datos.forEach(item => {
                    const fechaStr = new Date(item.fechaHora).toLocaleDateString('es-ES', { 
                        weekday: 'long', day: '2-digit', month: 'long' 
                    });
                    if (!grupos[fechaStr]) grupos[fechaStr] = [];
                    grupos[fechaStr].push(item);
                });

                lista.innerHTML = "";
                for (const dia in grupos) {
                    // Crear Cabecera de Día
                    lista.innerHTML += `<div class="day-divider"><h2>${dia}</h2></div>`;
                    
                    // Crear Tarjetas de ese día
                    grupos[dia].forEach(coche => {
                        const hora = new Date(coche.fechaHora).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
                        const esVO = coche.entregaVO === "SÍ";
                        const tel = String(coche.telefono || "").replace(/\s/g, '');

                        lista.innerHTML += `
                            <div class="car-card">
                                <div class="card-header">
                                    <span class="delivery-hour">${hora}</span>
                                    <span class="renting-label">${coche.renting || 'PARTICULAR'}</span>
                                </div>
                                <div class="card-content">
                                    <div class="client-name">${coche.cliente}</div>
                                    
                                    <div class="grid-info">
                                        <div><div class="label">Modelo</div><div class="value">${coche.modelo}</div></div>
                                        <div><div class="label">Matrícula</div><div class="value">${coche.matricula}</div></div>
                                    </div>

                                    <div class="vin-box">
                                        <div class="label">Bastidor (VIN)</div>
                                        <div class="vin-text">${coche.bastidor || 'SIN BASTIDOR'}</div>
                                    </div>

                                    <div class="vo-tag ${esVO ? 'vo-si' : 'vo-no'}">
                                        ${esVO ? '⚠️ RECOGER VO' : 'SIN VO'}
                                    </div>
                                </div>
                                <div class="actions">
                                    <a href="https://wa.me/34${tel}" class="btn-act" style="background:#25D366"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
                                    <a href="tel:${tel}" class="btn-act" style="background:var(--vw-blue); border:1px solid #00B0F0"><i class="fas fa-phone"></i> LLAMAR</a>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (e) {
                lista.innerHTML = '<div style="color:red; text-align:center;">Error al conectar con el Excel</div>';
            }
        }
    </script>
</body>
</html>
