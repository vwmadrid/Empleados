<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VW PRO | Castellana Wagen</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --vw-blue: #001E50; --vw-light: #00B0F0; --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1); --success: #25D366; --warning: #ff9800; --danger: #ff4444;
            --bg-dark: #000510;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { margin: 0; background: var(--bg-dark); color: white; min-height: 100vh; padding-bottom: 90px; }
        
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: rgba(0, 10, 30, 0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--glass-border); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0.4; color: white; text-decoration: none; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--vw-light); }
        .nav-item i { font-size: 20px; }
        .nav-item span { font-size: 10px; font-weight: bold; }

        .screen { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .day-divider { background: linear-gradient(90deg, var(--vw-blue), transparent); padding: 10px 15px; margin: 25px 0 10px 0; border-left: 4px solid var(--vw-light); position: sticky; top: 0; z-index: 10; backdrop-filter: blur(10px); }
        .day-divider h2 { margin: 0; font-size: 14px; text-transform: uppercase; font-weight: 800; }

        .car-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; margin-bottom: 20px; overflow: hidden; transition: all 0.3s ease; }
        .card-header { padding: 12px 15px; background: rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .delivery-hour { font-size: 24px; font-weight: 800; color: var(--vw-light); }
        .status-badge { font-size: 9px; padding: 4px 8px; border-radius: 5px; font-weight: bold; }
        .pedido-si { background: #004a99; color: white; }
        .pedido-no { background: #444; color: #aaa; }

        .card-content { padding: 15px; }
        .vin-box { background: rgba(0,0,0,0.4); padding: 8px; border-radius: 8px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.1); }
        .vin-text { font-family: monospace; font-size: 11px; color: var(--vw-light); word-break: break-all; }

        .extra-data { display: flex; gap: 10px; margin-top: 10px; }
        .data-tag { flex: 1; padding: 8px; border-radius: 8px; font-size: 10px; text-align: center; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); }
        .tag-blue { background: rgba(0, 176, 240, 0.1); color: var(--vw-light); border-color: var(--vw-light); cursor: pointer; }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; background: rgba(0,0,0,0.2); }
        .btn-act { padding: 12px; border-radius: 10px; text-align: center; text-decoration: none; color: white; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; border: none; font-family: inherit; }
        .btn-full { grid-column: span 2; }
        
        /* ESTILOS PARA COCHES ENTREGADOS */
        .entregado-card { opacity: 0.5; filter: grayscale(80%); border-color: var(--success); }
        .entregado-card .card-header { background: rgba(37, 211, 102, 0.1); }
        .btn-entregado { background: var(--success) !important; color: white; }
        .btn-deshacer { background: #333 !important; color: #aaa; }

        /* MAPA */
        .map-wrapper { overflow-x: auto; padding: 10px; background: #050a15; border-radius: 12px; border: 1px solid var(--glass-border); position: relative; }
        .map-grid { display: grid; grid-template-columns: repeat(24, 30px); grid-template-rows: repeat(20, 35px); gap: 3px; }
        .spot { background: var(--success); color: white; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; font-weight: bold; border: 1px solid rgba(0,0,0,0.1); overflow: hidden; text-align: center; line-height: 1; }
        .spot.occupied { background: var(--danger); }
        .spot-vin-text { font-size: 6px; word-break: break-all; padding: 0 1px; margin-top: 5px; font-family: monospace; }
        .spot-num { position: absolute; top: 1px; left: 2px; font-size: 7px; opacity: 0.8; }
        .pasillo { background: #1a253a; color: #4e5d7a; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; text-align: center; }
        
        #auto-assign-bar { position: fixed; top: 0; left: 0; right: 0; background: var(--vw-light); color: var(--vw-blue); padding: 12px; text-align: center; font-weight: bold; font-size: 12px; z-index: 2000; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="auto-assign-bar">
        ASIGNANDO BASTIDOR: <span id="target-vin"></span> 
        <button onclick="cancelAssign()" style="background:var(--vw-blue); color:white; border:none; padding:4px 10px; border-radius:5px; margin-left:10px;">CANCELAR</button>
    </div>

    <nav class="nav-bottom" id="main-nav" style="display: none;">
        <div class="nav-item active" id="nav-agenda" onclick="switchTab('s-agenda')"><i class="fas fa-list-ul"></i><span>Agenda</span></div>
        <div class="nav-item" id="nav-mapa" onclick="switchTab('s-mapa')"><i class="fas fa-warehouse"></i><span>Garaje</span></div>
    </nav>

    <section id="s-login" class="screen active" style="padding-top: 15vh; text-align: center;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6d/Volkswagen_logo_2019.svg" width="60" style="filter: invert(1);">
        <h2 style="font-weight: 200; margin: 30px 0;">Castellana Wagen <b style="color:var(--vw-light)">PRO</b></h2>
        <button onclick="iniciar('MANUEL')" style="width:80%; padding:20px; border-radius:15px; background:var(--vw-blue); color:white; border:1px solid var(--vw-light); font-weight:bold; margin-bottom:15px;">MANUEL</button>
        <button onclick="iniciar('ALEJANDRO')" style="width:80%; padding:20px; border-radius:15px; background:transparent; color:white; border:1px solid #444; font-weight:bold;">ALEJANDRO</button>
    </section>

    <section id="s-agenda" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h1 id="user-title" style="font-size:18px; margin:0;">ENTREGAS</h1>
            <i class="fas fa-sync-alt" onclick="sincronizarTodo()" style="padding:10px; cursor:pointer; color:var(--vw-light);"></i>
        </div>
        <input type="text" id="busc-agenda" placeholder="Buscar cliente, modelo, matrícula..." onkeyup="filtrarAgenda()" style="width:100%; padding:12px; border-radius:10px; background:var(--glass); border:1px solid var(--glass-border); color:white; margin-bottom:15px;">
        
        <div id="contenedor-agenda"></div>
    </section>

    <section id="s-mapa" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h2 style="font-size:18px; margin:0;">Plano del Garaje</h2>
            <i class="fas fa-cloud-download-alt" onclick="cargarGarajeNube()" style="padding:10px; cursor:pointer; color:var(--vw-light); font-size:18px;"></i>
        </div>
        <input type="text" id="busc-map" placeholder="Buscar bastidor en mapa..." onkeyup="buscarEnMapa()" style="width:100%; padding:12px; border-radius:10px; background:var(--glass); border:1px solid var(--glass-border); color:white; margin-bottom:15px;">
        <div class="map-wrapper">
            <div id="loading-map" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; font-weight:bold; color:var(--vw-light); display:none; z-index: 10;">
                <i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Conectando...
            </div>
            <div class="map-grid" id="parking-grid"></div>
        </div>
    </section>

    <script>
        // URLs CORRECTAS
        const API_AGENDA = "https://script.google.com/macros/s/AKfycbz-wRoC-N2bp2kvy5OUwp9qBcKJq3JT3r1vFuobX-7TwnvHXkGQapbc6BMhfU166HXQ/exec";
        const API_GARAJE = "https://script.google.com/macros/s/AKfycbwb_92nWXbKGNew3vlaj8lWHk2rn65njl_6Z5T2BorpcfyGpWwwmSO1SH6DSyYbBm8bLw/exec";
        
        let agente = "";
        let parkingData = {}; 
        let pendingVIN = null;
        // NUEVO: Array para guardar localmente qué coches hemos entregado
        let cochesEntregados = JSON.parse(localStorage.getItem('entregados_vw')) || [];

        function iniciar(n) {
            agente = n;
            document.getElementById('s-login').classList.remove('active');
            document.getElementById('s-agenda').classList.add('active');
            document.getElementById('main-nav').style.display = 'flex';
            document.getElementById('user-title').innerText = "ENTREGAS: " + agente;
            
            renderMap();
            sincronizarTodo();
        }

        function switchTab(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id.split('-')[1]).classList.add('active');
            window.scrollTo(0,0);
        }

        function sincronizarTodo() {
            cargarGarajeNube();
            cargarAgenda();
        }

        // --- GARAJE EN LA NUBE ---
        async function cargarGarajeNube() {
            document.getElementById('loading-map').style.display = 'block';
            try {
                const url = API_GARAJE + "?action=getParking&t=" + Date.now();
                const response = await fetch(url);
                parkingData = await response.json();
                renderMap();
                cargarAgenda(); 
            } catch (e) {
                console.error("Error cargando garaje nube:", e);
            }
            document.getElementById('loading-map').style.display = 'none';
        }

        async function actualizarPlazaNube(idPlaza, vin) {
            if(vin) {
                parkingData[idPlaza] = { vin: vin };
            } else {
                delete parkingData[idPlaza];
            }
            renderMap();
            cargarAgenda();

            try {
                const urlSegura = API_GARAJE + "?action=setParking&plaza=" + idPlaza + "&vin=" + encodeURIComponent(vin) + "&t=" + Date.now();
                const respuesta = await fetch(urlSegura, { method: 'GET', mode: 'cors' });
                if (!respuesta.ok) throw new Error("Rechazado por el servidor");
            } catch (e) {
                console.error(e);
            }
        }

        function startAutoAssign(vin) {
            if(!vin || vin === 'NO DISPONIBLE') { alert("Sin bastidor."); return; }
            pendingVIN = vin;
            document.getElementById('target-vin').innerText = pendingVIN;
            document.getElementById('auto-assign-bar').style.display = 'block';
            switchTab('s-mapa');
        }

        function cancelAssign() {
            pendingVIN = null;
            document.getElementById('auto-assign-bar').style.display = 'none';
        }

        // --- NUEVO: FUNCIONES DE LA AGENDA ---
        function filtrarAgenda() {
            const busqueda = document.getElementById('busc-agenda').value.toUpperCase();
            const tarjetas = document.querySelectorAll('.car-card');
            
            tarjetas.forEach(tarjeta => {
                const texto = tarjeta.innerText.toUpperCase();
                if (texto.includes(busqueda)) {
                    tarjeta.style.display = 'block';
                } else {
                    tarjeta.style.display = 'none';
                }
            });
        }

        function toggleEntregado(vin) {
            if (!vin || vin === 'NO DISPONIBLE') return;
            
            const index = cochesEntregados.indexOf(vin);
            if (index === -1) {
                // MARCAR COMO ENTREGADO
                if(confirm("¿Marcar este coche como ENTREGADO?\nSu plaza del garaje se quedará libre para los compañeros.")) {
                    cochesEntregados.push(vin);
                    localStorage.setItem('entregados_vw', JSON.stringify(cochesEntregados));
                    
                    // Buscar si tiene plaza y liberarla automáticamente
                    let plazaAsignada = null;
                    for(let id in parkingData) { if(parkingData[id].vin === vin) plazaAsignada = id; }
                    
                    if (plazaAsignada) {
                        actualizarPlazaNube(plazaAsignada, ""); // Esto lo borra y recarga la vista
                    } else {
                        cargarAgenda();
                    }
                }
            } else {
                // DESHACER (Desmarcar)
                cochesEntregados.splice(index, 1);
                localStorage.setItem('entregados_vw', JSON.stringify(cochesEntregados));
                cargarAgenda();
            }
        }

        async function cargarAgenda() {
            const lista = document.getElementById('contenedor-agenda');
            if(lista.innerHTML === "") lista.innerHTML = '<p style="text-align:center; padding:40px; opacity:0.5;">Cargando entregas de ' + agente + '...</p>';
            
            try {
                const response = await fetch(API_AGENDA + "?action=getAgenda&agente=" + agente);
                const datos = await response.json();
                
                if (!datos || datos.length === 0) {
                    lista.innerHTML = `<p style="text-align:center; padding:40px;">No hay entregas para ${agente}.</p>`;
                    return;
                }

                const grupos = {};
                datos.forEach(c => {
                    let fechaStr = "SIN FECHA";
                    if (c.fechaHora) {
                        const d = new Date(c.fechaHora);
                        if (!isNaN(d)) fechaStr = d.toLocaleDateString('es-ES', { weekday: 'long', day: '2-digit', month: 'long' });
                    }
                    if (!grupos[fechaStr]) grupos[fechaStr] = [];
                    grupos[fechaStr].push(c);
                });

                lista.innerHTML = "";
                
                for (const dia in grupos) {
                    lista.innerHTML += `<div class="day-divider"><h2>${dia}</h2></div>`;
                    
                    grupos[dia].forEach(c => {
                        let horaStr = "--:--";
                        if (c.fechaHora) {
                            const d = new Date(c.fechaHora);
                            if (!isNaN(d)) horaStr = d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
                        }
                        
                        const vin = String(c.bastidor || 'NO DISPONIBLE').toUpperCase().trim();
                        const pedido = String(c.pedido || '').toUpperCase().trim();
                        const vo = String(c.entregaVO || '').toUpperCase().trim();
                        const tel = String(c.telefono || '').replace(/\s/g, '');
                        const renting = c.renting ? String(c.renting).toUpperCase().trim() : ''; 
                        
                        let plazaAsignada = null;
                        for(let id in parkingData) { if(parkingData[id].vin === vin) plazaAsignada = id; }

                        // Comprobar si está entregado
                        const isEntregado = cochesEntregados.includes(vin);
                        const claseEntregado = isEntregado ? 'entregado-card' : '';

                        lista.innerHTML += `
                            <div class="car-card ${claseEntregado}">
                                <div class="card-header">
                                    <span class="delivery-hour">${horaStr}</span>
                                    <span class="status-badge ${pedido === 'SÍ' ? 'pedido-si' : 'pedido-no'}">${pedido === 'SÍ' ? 'PEDIDO' : 'NO PEDIDO'}</span>
                                </div>
                                <div class="card-content">
                                    <div style="font-size:18px; font-weight:bold; margin-bottom:5px;">${c.cliente || '-'}</div>
                                    ${renting ? `<div style="font-size:11px; color:var(--vw-light); margin-bottom:10px; font-weight:bold;"><i class="fas fa-building"></i> RENTING: ${renting}</div>` : ''}
                                    
                                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                                        <div><div style="font-size:9px; opacity:0.5;">MODELO</div><div style="font-size:13px;">${c.modelo || '-'}</div></div>
                                        <div><div style="font-size:9px; opacity:0.5;">MATRÍCULA</div><div style="font-size:13px; font-weight:bold;">${c.matricula || '-'}</div></div>
                                    </div>
                                    <div class="vin-box">
                                        <div style="font-size:9px; opacity:0.5;">BASTIDOR (VIN)</div>
                                        <div class="vin-text">${vin}</div>
                                    </div>
                                    <div class="extra-data">
                                        <div class="data-tag" style="color:${vo === 'SÍ' ? 'var(--warning)' : 'var(--success)'}; border-color:${vo === 'SÍ' ? 'var(--warning)' : 'var(--success)'}">ENTREGA COCHE: ${vo === 'SÍ' ? 'SÍ' : 'NO'}</div>
                                        <div class="data-tag tag-blue" onclick="startAutoAssign('${vin}')">
                                            <i class="fas fa-map-marker-alt"></i> ${plazaAsignada ? 'PLAZA ' + plazaAsignada : 'ASIGNAR PLAZA'}
                                        </div>
                                    </div>
                                </div>
                                <div class="actions">
                                    <a href="tel:${tel}" class="btn-act" style="background:var(--vw-blue); border:1px solid var(--vw-light)"><i class="fas fa-phone"></i> LLAMAR</a>
                                    <a href="https://wa.me/34${tel}" class="btn-act" style="background:#25D366"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
                                    <button onclick="toggleEntregado('${vin}')" class="btn-act btn-full ${isEntregado ? 'btn-deshacer' : 'btn-entregado'}">
                                        <i class="fas ${isEntregado ? 'fa-undo' : 'fa-check-circle'}"></i> 
                                        ${isEntregado ? 'DESHACER ENTREGA' : '✔ MARCAR COMO ENTREGADO'}
                                    </button>
                                </div>
                            </div>`;
                    });
                }
                
                // Ejecutamos el filtro por si tenías algo escrito en el buscador al recargar
                filtrarAgenda();
                
            } catch (e) {
                lista.innerHTML = `<p style="color:red; text-align:center; padding:20px;">Error interno: ${e.message}</p>`;
            }
        }

        // --- MAPA ---
        const mapConfig = [
            ...Array.from({length: 20}, (_, i) => ({ id: (12 + i).toString(), col: '1 / 6', row: `${i + 1} / ${i + 2}` })),
            { id: '11', col: '10 / 16', row: '1 / 2' }, { id: '9', col: '10 / 16', row: '2 / 3' },
            { id: '8', col: '10 / 16', row: '3 / 4' }, { id: '7', col: '10 / 16', row: '4 / 5' },
            { id: '6', col: '10 / 16', row: '5 / 6' }, { id: '10', col: '16 / 22', row: '1 / 2' },
            { id: '5', col: '16 / 22', row: '5 / 6' },
            ...Array.from({length: 9}, (_, i) => ({ id: (50 - i).toString(), col: '10 / 16', row: `${7 + i} / ${8 + i}` })),
            { id: '4', col: '22 / 25', row: '7 / 9' }, { id: '3', col: '22 / 25', row: '9 / 11' },
            { id: '2', col: '22 / 25', row: '11 / 13' }, { id: '1', col: '22 / 25', row: '13 / 15' },
            { id: '41', col: '8 / 10', row: '17 / 19' }, { id: '40', col: '10 / 13', row: '17 / 19' },
            { id: '39', col: '13 / 16', row: '17 / 19' }, { id: '38', col: '16 / 19', row: '17 / 19' },
            { id: '37', col: '19 / 22', row: '17 / 19' }, { id: '32', col: '8 / 10', row: '19 / 21' },
            { id: '33', col: '10 / 13', row: '19 / 21' }, { id: '34', col: '13 / 16', row: '19 / 21' },
            { id: '35', col: '16 / 19', row: '19 / 21' }, { id: '36', col: '19 / 22', row: '19 / 21' }
        ];

        function renderMap() {
            const grid = document.getElementById('parking-grid');
            grid.innerHTML = `
                <div class="pasillo" style="grid-column:6/10; grid-row:1/21; writing-mode: vertical-rl;">PASILLO CENTRAL</div>
                <div class="pasillo" style="grid-column:16/22; grid-row:7/16; background:#121a2d;">RAMPA</div>
            `;
            
            mapConfig.forEach(c => {
                const data = parkingData[c.id];
                const div = document.createElement('div');
                div.className = 'spot ' + (data ? 'occupied' : '');
                div.id = 'plaza-' + c.id;
                div.style.gridColumn = c.col; div.style.gridRow = c.row;
                
                const vinMostrado = data ? data.vin : '';
                div.innerHTML = `<span class="spot-num">${c.id}</span><div class="spot-vin-text">${vinMostrado}</div>`;
                
                div.onclick = () => {
                    const checkAndMove = (nuevoVin) => {
                        let plazaAntigua = null;
                        for(let id in parkingData) {
                            if(parkingData[id].vin === nuevoVin) plazaAntigua = id;
                        }

                        if(plazaAntigua) {
                            if(plazaAntigua === c.id) {
                                alert("El coche ya está en esta misma plaza.");
                            } else {
                                if(confirm(`⚠️ El bastidor ${nuevoVin} ya está aparcado en la PLAZA ${plazaAntigua}.\n\n¿Quieres moverlo a la PLAZA ${c.id}?`)) {
                                    actualizarPlazaNube(plazaAntigua, ""); 
                                    setTimeout(() => actualizarPlazaNube(c.id, nuevoVin), 400); 
                                }
                            }
                        } else {
                            actualizarPlazaNube(c.id, nuevoVin);
                        }
                    };

                    if(pendingVIN) {
                        checkAndMove(pendingVIN);
                        cancelAssign();
                    } else if(data) {
                        if(confirm("¿Liberar plaza " + c.id + "?\nBastidor: " + data.vin)) actualizarPlazaNube(c.id, "");
                    } else {
                        const v = prompt("Aparcar - Introduce Bastidor:");
                        if(v) checkAndMove(String(v).toUpperCase().trim());
                    }
                };
                grid.appendChild(div);
            });
        }

        function buscarEnMapa() {
            const b = document.getElementById('busc-map').value.toUpperCase();
            mapConfig.forEach(c => {
                const el = document.getElementById('plaza-' + c.id);
                if(b && parkingData[c.id] && parkingData[c.id].vin.includes(b)) {
                    el.style.border = "2px solid white"; el.style.boxShadow = "0 0 10px white"; el.style.zIndex = "10";
                } else { 
                    el.style.border = "1px solid rgba(0,0,0,0.1)"; el.style.boxShadow = "none"; el.style.zIndex = "1";
                }
            });
        }
    </script>
</body>
</html>
