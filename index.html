<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VW PRO | Castellana Wagen</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --vw-blue: #001E50; --vw-light: #00B0F0; --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1); --success: #25D366; --warning: #ff9800; --danger: #ff4444;
            --bg-dark: #000510;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { margin: 0; background: var(--bg-dark); color: white; min-height: 100vh; padding-bottom: 90px; }
        
        /* NAVEGACIÓN */
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: rgba(0, 10, 30, 0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--glass-border); z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0.4; color: white; text-decoration: none; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--vw-light); }
        .nav-item i { font-size: 20px; }
        .nav-item span { font-size: 10px; font-weight: bold; }

        .screen { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* TARJETAS AGENDA */
        .day-divider { background: linear-gradient(90deg, var(--vw-blue), transparent); padding: 10px 15px; margin: 25px 0 10px 0; border-left: 4px solid var(--vw-light); position: sticky; top: 0; z-index: 10; backdrop-filter: blur(10px); }
        .day-divider h2 { margin: 0; font-size: 14px; text-transform: uppercase; font-weight: 800; }
        .car-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; margin-bottom: 20px; overflow: hidden; }
        .card-header { padding: 12px 15px; background: rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .delivery-hour { font-size: 24px; font-weight: 800; color: var(--vw-light); }
        .card-content { padding: 15px; }
        .vin-box { background: rgba(0,0,0,0.4); padding: 8px; border-radius: 8px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.1); }
        .vin-text { font-family: monospace; font-size: 11px; color: var(--vw-light); }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; background: rgba(0,0,0,0.2); }
        .btn-act { padding: 12px; border-radius: 10px; text-align: center; text-decoration: none; color: white; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 6px; border: none; }

        /* MAPA GARAJE */
        .map-wrapper { overflow-x: auto; padding: 10px; background: #050a15; border-radius: 12px; border: 1px solid var(--glass-border); position: relative; }
        .map-grid { display: grid; grid-template-columns: repeat(24, 30px); grid-template-rows: repeat(20, 35px); gap: 3px; }
        .spot { background: var(--success); color: white; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; font-weight: bold; border: 1px solid rgba(0,0,0,0.1); overflow: hidden; text-align: center; }
        .spot.occupied { background: var(--danger); }
        .spot-vin-text { font-size: 6px; word-break: break-all; margin-top: 5px; }
        .spot-num { position: absolute; top: 1px; left: 2px; font-size: 7px; opacity: 0.8; }
        .pasillo { background: #1a253a; color: #4e5d7a; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; }

        /* MODAL ESCÁNER */
        #modal-aparcar { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,5,16,0.98); z-index:3000; align-items:center; justify-content:center; flex-direction:column; padding:15px; }
        #reader { width: 100%; max-width: 400px; border-radius: 12px; overflow: hidden; background: #000; border: 2px solid var(--vw-light); }
        .cam-select { margin-top: 10px; background: #222; color: white; border: 1px solid #444; padding: 12px; border-radius: 8px; width: 100%; max-width: 400px; }
    </style>
</head>
<body>

    <div id="modal-aparcar">
        <h2 id="modal-title" style="color:var(--vw-light); margin-bottom:15px;">Aparcar</h2>
        <div id="reader"></div>
        <select id="camera-select" class="cam-select" onchange="cambiarCamara(this.value)">
            <option value="">Detectando cámaras...</option>
        </select>
        <div style="margin: 20px 0 10px 0; font-size: 12px; color: #888;">ÚLTIMOS 8 CARACTERES</div>
        <input type="text" id="modal-vin-input" placeholder="Escribir manual..." style="width:100%; max-width:400px; padding:15px; border-radius:10px; border:1px solid #444; background:#000; color:white; font-size:20px; text-align:center; text-transform:uppercase;">
        <button onclick="guardarPlazaManual()" style="width:100%; max-width:400px; padding:18px; background:var(--success); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:15px; font-size:16px;">CONFIRMAR PLAZA</button>
        <button onclick="cerrarModalAparcar()" style="margin-top:20px; color:#ff4444; background:none; border:none; font-weight:bold; padding:10px;">CANCELAR</button>
    </div>

    <section id="s-login" class="screen active" style="padding-top: 20vh; text-align: center;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6d/Volkswagen_logo_2019.svg" width="60" style="filter: invert(1); margin-bottom:20px;">
        <h2 style="font-weight: 200;">Castellana Wagen <b style="color:var(--vw-light)">PRO</b></h2>
        <button onclick="iniciar('MANUEL')" style="width:80%; padding:20px; border-radius:15px; background:var(--vw-blue); color:white; border:1px solid var(--vw-light); font-weight:bold; margin-bottom:15px;">MANUEL</button>
        <button onclick="iniciar('ALEJANDRO')" style="width:80%; padding:20px; border-radius:15px; background:transparent; color:white; border:1px solid #444; font-weight:bold; margin-bottom:30px;">ALEJANDRO</button>
        <button onclick="iniciarSemat()" style="width:80%; padding:15px; border-radius:10px; background:#111; color:var(--success); border:1px solid var(--success); font-weight:bold;"><i class="fas fa-car"></i> ACCESO SEMAT</button>
    </section>

    <section id="s-agenda" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h1 id="user-title" style="font-size:18px; margin:0;">ENTREGAS</h1>
            <i class="fas fa-sync-alt" onclick="sincronizarTodo()" style="color:var(--vw-light); padding:10px;"></i>
        </div>
        <div id="contenedor-agenda"></div>
    </section>

    <section id="s-mapa" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 id="titulo-mapa" style="font-size:18px; margin:0;">Plano Garaje</h2>
            <i class="fas fa-sync-alt" onclick="sincronizarTodo()" style="color:var(--vw-light); padding:10px;"></i>
        </div>
        <div class="map-wrapper">
            <div class="map-grid" id="parking-grid"></div>
        </div>
    </section>

    <nav class="nav-bottom" id="main-nav" style="display: none;">
        <div class="nav-item active" id="nav-agenda" onclick="switchTab('s-agenda')"><i class="fas fa-list-ul"></i><span>Agenda</span></div>
        <div class="nav-item" id="nav-mapa" onclick="switchTab('s-mapa')"><i class="fas fa-warehouse"></i><span>Garaje</span></div>
    </nav>

    <script>
        const API_AGENDA = "https://script.google.com/macros/s/AKfycbz-wRoC-N2bp2kvy5OUwp9qBcKJq3JT3r1vFuobX-7TwnvHXkGQapbc6BMhfU166HXQ/exec";
        const API_GARAJE = "https://script.google.com/macros/s/AKfycbwb_92nWXbKGNew3vlaj8lWHk2rn65njl_6Z5T2BorpcfyGpWwwmSO1SH6DSyYbBm8bLw/exec";
        
        let agente = "";
        let parkingData = {}; 
        let currentScanner = null;
        let plazaDestino = null;
        let esSemat = false;

        // CONFIGURACIÓN DE LAS PLAZAS IGUAL QUE EL ANTERIOR
        const mapConfig = [
            ...Array.from({length: 20}, (_, i) => ({ id: (12 + i).toString(), col: '1 / 6', row: `${i + 1} / ${i + 2}` })),
            { id: '11', col: '10 / 16', row: '1 / 2' }, { id: '9', col: '10 / 16', row: '2 / 3' },
            { id: '8', col: '10 / 16', row: '3 / 4' }, { id: '7', col: '10 / 16', row: '4 / 5' },
            { id: '6', col: '10 / 16', row: '5 / 6' }, { id: '10', col: '16 / 22', row: '1 / 2' },
            { id: '5', col: '16 / 22', row: '5 / 6' },
            ...Array.from({length: 9}, (_, i) => ({ id: (50 - i).toString(), col: '10 / 16', row: `${7 + i} / ${8 + i}` })),
            { id: '4', col: '22 / 25', row: '7 / 9' }, { id: '3', col: '22 / 25', row: '9 / 11' },
            { id: '2', col: '22 / 25', row: '11 / 13' }, { id: '1', col: '22 / 25', row: '13 / 15' },
            { id: '41', col: '8 / 10', row: '17 / 19' }, { id: '40', col: '10 / 13', row: '17 / 19' },
            { id: '39', col: '13 / 16', row: '17 / 19' }, { id: '38', col: '16 / 19', row: '17 / 19' },
            { id: '37', col: '19 / 22', row: '17 / 19' }, { id: '32', col: '8 / 10', row: '19 / 21' },
            { id: '33', col: '10 / 13', row: '19 / 21' }, { id: '34', col: '13 / 16', row: '19 / 21' },
            { id: '35', col: '16 / 19', row: '19 / 21' }, { id: '36', col: '19 / 22', row: '19 / 21' }
        ];

        function abrirModalAparcar(idPlaza) {
            plazaDestino = idPlaza;
            document.getElementById('modal-title').innerText = "APARCAR EN PLAZA " + idPlaza;
            document.getElementById('modal-vin-input').value = "";
            document.getElementById('modal-aparcar').style.display = 'flex';
            iniciarLector();
        }

        async function iniciarLector() {
            if (currentScanner) await currentScanner.stop();
            currentScanner = new Html5Qrcode("reader");
            const config = { fps: 20, qrbox: { width: 280, height: 120 } };

            Html5Qrcode.getCameras().then(cameras => {
                const select = document.getElementById('camera-select');
                select.innerHTML = "";
                cameras.forEach((cam, index) => {
                    const opt = document.createElement('option');
                    opt.value = cam.id;
                    opt.text = cam.label || `Cámara ${index + 1}`;
                    if(cam.label.toLowerCase().includes('back')) opt.selected = true;
                    select.appendChild(opt);
                });

                let selectedCam = select.value || { facingMode: "environment" };
                currentScanner.start(selectedCam, config, (text) => {
                    // RECORTE A LOS ÚLTIMOS 8
                    let clean = text.toUpperCase().replace(/\s/g, '');
                    if(clean.length >= 8) clean = clean.slice(-8);
                    document.getElementById('modal-vin-input').value = clean;
                    guardarPlazaManual();
                }).catch(e => console.error(e));
            });
        }

        function cambiarCamara(id) {
            if(currentScanner) {
                currentScanner.stop().then(() => {
                    currentScanner.start(id, { fps: 20, qrbox: { width: 280, height: 120 } }, (text) => {
                        let clean = text.toUpperCase().replace(/\s/g, '').slice(-8);
                        document.getElementById('modal-vin-input').value = clean;
                        guardarPlazaManual();
                    });
                });
            }
        }

        function cerrarModalAparcar() {
            document.getElementById('modal-aparcar').style.display = 'none';
            if(currentScanner) currentScanner.stop();
        }

        function guardarPlazaManual() {
            let v = document.getElementById('modal-vin-input').value.toUpperCase().replace(/\s/g, '');
            if(v.length >= 8) v = v.slice(-8);
            if(v) {
                actualizarPlazaNube(plazaDestino, v);
                cerrarModalAparcar();
            }
        }

        async function sincronizarTodo() {
            try {
                const resGaraje = await fetch(API_GARAJE + "?action=getParking&t=" + Date.now());
                parkingData = await resGaraje.json();
                renderMap();
                if(!esSemat) cargarAgenda();
            } catch (e) {}
        }

        async function cargarAgenda() {
            const lista = document.getElementById('contenedor-agenda');
            lista.innerHTML = '<p style="text-align:center; opacity:0.5;">Actualizando entregas...</p>';
            try {
                const res = await fetch(API_AGENDA + "?action=getAgenda&agente=" + agente);
                const datos = await res.json();
                lista.innerHTML = "";
                datos.forEach(c => {
                    let vin = String(c.bastidor || '').toUpperCase().replace(/\s/g, '');
                    if(vin.length >= 8) vin = vin.slice(-8);

                    lista.innerHTML += `
                        <div class="car-card">
                            <div class="card-header"><span class="delivery-hour">Entrega</span></div>
                            <div class="card-content">
                                <div style="font-size:18px; font-weight:bold;">${c.cliente || 'CLIENTE'}</div>
                                <div style="font-size:13px; color:var(--vw-light);">${c.modelo || '-'} | ${c.matricula || '-'}</div>
                                <div class="vin-box"><div class="vin-text">${vin}</div></div>
                            </div>
                        </div>`;
                });
            } catch (e) { lista.innerHTML = "Error al cargar agenda"; }
        }

        function renderMap() {
            const grid = document.getElementById('parking-grid');
            grid.innerHTML = `<div class="pasillo" style="grid-column:6/10; grid-row:1/21; writing-mode: vertical-rl;">PASILLO CENTRAL</div>`;
            mapConfig.forEach(c => {
                const data = parkingData[c.id];
                const div = document.createElement('div');
                div.className = 'spot ' + (data ? 'occupied' : '');
                div.style.gridColumn = c.col; div.style.gridRow = c.row;
                div.innerHTML = `<span class="spot-num">${c.id}</span><div class="spot-vin-text">${data ? data.vin : ''}</div>`;
                div.onclick = () => abrirModalAparcar(c.id);
                grid.appendChild(div);
            });
        }

        async function actualizarPlazaNube(id, vin) {
            parkingData[id] = { vin: vin };
            renderMap();
            fetch(API_GARAJE + `?action=setParking&plaza=${id}&vin=${vin}`);
        }

        function iniciar(n) {
            agente = n; esSemat = false;
            document.getElementById('s-login').classList.remove('active');
            document.getElementById('s-agenda').classList.add('active');
            document.getElementById('main-nav').style.display = 'flex';
            document.getElementById('user-title').innerText = "ENTREGAS: " + agente;
            sincronizarTodo();
        }

        function iniciarSemat() {
            esSemat = true;
            document.getElementById('s-login').classList.remove('active');
            document.getElementById('s-mapa').classList.add('active');
            document.getElementById('main-nav').style.display = 'none';
            sincronizarTodo();
        }

        function switchTab(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id.split('-')[1]).classList.add('active');
        }
    </script>
</body>
</html>
